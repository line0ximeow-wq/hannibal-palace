<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дворец Памяти</title>
    <style>
        body {
            background-color: #0d0d0d; /* Черный как нуар */
            color: #d1d1d1;
            font-family: "Georgia", serif; /* Красивый шрифт с засечками */
            line-height: 1.6;
            padding: 5%;
            max-width: 900px;
            margin: auto;
        }
        h1 { color: #8b0000; text-align: center; font-style: italic; }
        .divider { border-bottom: 1px solid #333; margin: 30px 0; }
        
        /* Оформление диалогов по вашим правилам */
        .dialogue p { margin: 10px 0; }
    </style>
</head>
<body>

    <h1>Дворец памяти: Анализ</h1>
    <div class="divider"></div>

    <h2>Введение</h2>
    <p>Это пространство посвящено детальному разбору визуального языка и скрытых смыслов...</p>

    <div class="dialogue">
        <p>— Я не нахожу этот анализ забавным, — произнес Ганнибал.</p>
        <p>— А вы не анализируйте, доктор. Просто смотрите, — ответил Уилл.</p>
    </div>

</body>
</html>
